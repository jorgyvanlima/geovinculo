# =========================================================================
# GeoVínculo CAR - Configuração de Proxy Reverso Nginx para geovinculo.sytes.net
# =========================================================================
# Salve este arquivo em /etc/nginx/sites-available/geovinculo no seu servidor AWS
# E crie o link simbólico correspondente em sites-enabled:
# sudo ln -s /etc/nginx/sites-available/geovinculo /etc/nginx/sites-enabled/
# Teste e recarregue o Nginx: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name geovinculo.sytes.net;
    
    # Redireciona tráfego HTTP para HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name geovinculo.sytes.net;

    ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;

    # SSL protocols
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Redirecionamento automático de / para o portal da Landing Page
    location = / {
        return 301 https://$host/geovinculo_app/;
    }

    # 1. Portal & Landing Page (Frontend Nginx)
    location /geovinculo_app/ {
        proxy_pass http://127.0.0.1:8089/geovinculo_app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. API Backend (FastAPI)
    # Endpoint para integração do Lovable e chamadas externas.
    location /geovinculo_api {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Suporte a conexões longas e WebSockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Tamanho limite para requisições multipart (ex: envio de geojson grande)
        client_max_body_size 100M;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # 3. Motor de Drones (NodeODM)
    # Processamento de ortomosaicos e imagens aéreas.
    location /geovinculo_odm/ {
        # A barra '/' no final do proxy_pass diz ao Nginx para remover o prefixo
        # '/geovinculo_odm/' antes de encaminhar a requisição para o contêiner.
        proxy_pass http://127.0.0.1:3003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Suporte a streaming de logs da tarefa e WebSockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Importante: Aumentar o limite para permitir upload de ZIPs pesados de fotos de drones
        client_max_body_size 1G;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    # 4. Servidor de Mapas (GeoServer)
    # Publicação de camadas OGC (WMS/WFS).
    location /geovinculo_geoserver/ {
        # Redireciona com barra para acessar diretamente o contexto /geoserver
        proxy_pass http://127.0.0.1:8084/geoserver/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 600s;
        client_max_body_size 100M;
    }
}
